<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Premium Placement Dashboard</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<!-- Google Fonts -->
<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">

<style>
body, html {
    margin: 0;
    padding: 0;
    font-family: 'Roboto', sans-serif;
    background: linear-gradient(180deg, #f5f7fa, #c3cfe2);
    color: #333;
}

header {
    background: linear-gradient(135deg, #4e73df, #6f42c1);
    color: #fff;
    padding: 20px 0;
    font-size: 28px;
    font-weight: 700;
    text-align: center;
    box-shadow: 0 4px 10px rgba(0,0,0,0.15);
}

.container {
    max-width: 1200px;
    margin: auto;
    padding: 20px;
}

.cards {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
    gap: 20px;
    margin-bottom: 30px;
}

.card {
    background: #fff;
    border-radius: 15px;
    padding: 25px 20px;
    text-align: center;
    box-shadow: 0 6px 20px rgba(0,0,0,0.1);
    transition: transform 0.3s, box-shadow 0.3s;
}

.card:hover {
    transform: translateY(-8px);
    box-shadow: 0 12px 25px rgba(0,0,0,0.15);
}

.card h3 {
    font-weight: 500;
    font-size: 18px;
    margin-bottom: 10px;
    color: #555;
}

.card p {
    font-size: 26px;
    font-weight: 700;
    color: #4e73df;
}

.charts {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
    gap: 25px;
}

.chart-box {
    background: #fff;
    border-radius: 15px;
    padding: 20px;
    box-shadow: 0 6px 20px rgba(0,0,0,0.1);
}

.chart-box canvas {
    border-radius: 10px;
}

.chart-box h4 {
    text-align: center;
    margin-bottom: 15px;
    font-weight: 600;
    color: #4e73df;
}

@media (max-width: 768px) {
    .cards {
        grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
    }
}
</style>
</head>

<body>

<header>📊  College Placement Dashboard</header>

<div class="container">

<!-- KPI Cards -->
<div class="cards">
    <div class="card">
        <h3>Total Students</h3>
        <p id="students">0</p>
    </div>
    <div class="card">
        <h3>Total Companies</h3>
        <p id="companies">0</p>
    </div>
    <div class="card">
        <h3>Placed Students</h3>
        <p id="placed">0</p>
    </div>
    <div class="card">
        <h3>Highest Package</h3>
        <p id="package">0</p>
    </div>
</div>

<!-- Charts -->
<div class="charts">

    <div class="chart-box">
        <h4>Placement Status Distribution</h4>
        <canvas id="pieChart"></canvas>
    </div>

    <div class="chart-box">
        <h4>Branch-wise Placement Analysis</h4>
        <canvas id="barChart"></canvas>
    </div>

    <div class="chart-box">
        <h4>Placement Trend Over Time</h4>
        <canvas id="lineChart"></canvas>
    </div>

    <div class="chart-box">
        <h4>Company-wise Placement Distribution</h4>
        <canvas id="companyChart"></canvas>
    </div>

</div>

</div>

<script>
Chart.defaults.color = "#333";

/* --- Fetch KPI Data --- */
fetch('http://localhost:3000/dashboard-kpi')
.then(res => res.json())
.then(data => {
    document.getElementById("students").innerText = data[0].total_students;
    document.getElementById("companies").innerText = data[0].total_companies;
    document.getElementById("placed").innerText = data[0].students_placed;
    document.getElementById("package").innerText = "₹" + (data[0].highest_package/1000) + "K";
});

/* --- Pie Chart: Placement Status --- */
fetch('http://localhost:3000/placement-status')
.then(res => res.json())
.then(data => {
    new Chart(document.getElementById("pieChart"), {
        type: 'pie',
        data: {
            labels: data.map(d => d.status),
            datasets: [{
                data: data.map(d => d.total),
                backgroundColor: ['#4e73df', '#e74a3b']
            }]
        },
        options: { responsive: true }
    });
});

/* --- Bar Chart: Branch-wise Placement --- */
fetch('http://localhost:3000/branch-placement')
.then(res => res.json())
.then(data => {
    new Chart(document.getElementById("barChart"), {
        type: 'bar',
        data: {
            labels: data.map(d => d.branch),
            datasets: [{
                label: "Placed Students",
                data: data.map(d => d.placed_students),
                backgroundColor: '#4e73df'
            }]
        },
        options: {
            responsive: true,
            plugins: { legend: { display: false } },
            scales: { y: { beginAtZero: true } }
        }
    });
});

/* --- Line Chart: Placement Trend --- */
fetch('http://localhost:3000/placement-trend')
.then(res => res.json())
.then(data => {
    new Chart(document.getElementById("lineChart"), {
        type: 'line',
        data: {
            labels: data.map(d => new Date(d.drive_date).toLocaleDateString()),
            datasets: [{
                label: "Placements",
                data: data.map(d => d.placements),
                fill: true,
                backgroundColor: 'rgba(78,115,223,0.1)',
                borderColor: '#4e73df',
                tension: 0.4
            }]
        },
        options: { responsive: true }
    });
});

/* --- Company Chart: Company-wise Placement --- */
fetch('http://localhost:3000/company-placement')
.then(res => res.json())
.then(data => {
    new Chart(document.getElementById("companyChart"), {
        type: 'bar',
        data: {
            labels: data.map(d => d.company_name),
            datasets: [{
                label: "Placements",
                data: data.map(d => d.placed_students),
                backgroundColor: '#1cc88a'
            }]
        },
        options: {
            responsive: true,
            plugins: { legend: { display: false } },
            scales: { y: { beginAtZero: true } }
        }
    });
});
</script>

</body>
</html>
